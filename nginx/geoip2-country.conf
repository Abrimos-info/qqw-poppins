# GeoIP2 country detection
# Include this snippet inside the http {} block in nginx.conf:
#   include /etc/nginx/geoip2-country.conf;  (or wherever this file is deployed)
#
# Requirements:
#   - libnginx-mod-http-geoip2 already loaded via /etc/nginx/modules-enabled/50-mod-http-geoip2.conf
#   - Database: /usr/share/GeoIP/dbip-country.mmdb
#     No account needed — DB-IP free tier (CC BY 4.0): https://db-ip.com/db/download/ip-to-country-lite
#     Install/update: bash nginx/update-geoip.sh  (then set up monthly cron)

geoip2 /usr/share/GeoIP/dbip-country.mmdb {
    $geoip2_country_code country iso_code;
}
